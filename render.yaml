services:
  - type: web
    name: auto-translate
    env: python
    rootDir: translator
    buildCommand: pip install -r requirements.txt && python execution/preprocess_kb.py
    startCommand: gunicorn --timeout 120 -k uvicorn.workers.UvicornWorker execution.api_server:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
