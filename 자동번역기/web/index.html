<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 프리미엄 자동번역기</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.5);
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --accent: #10b981;
        }

        * {
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            color: var(--text);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
            backdrop-filter: blur(12px);
            background: var(--card-bg);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 600;
            margin: 0;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        p.subtitle {
            color: var(--text-dim);
            margin-top: 10px;
        }

        .input-section {
            position: relative;
            margin-bottom: 30px;
        }

        textarea {
            width: 100%;
            height: 160px;
            background: rgba(15, 23, 42, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 20px;
            color: var(--text);
            font-size: 1.1rem;
            resize: none;
            outline: none;
        }

        textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary-glow);
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-top: -20px;
            justify-content: flex-end;
            padding-right: 10px;
        }

        button {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            color: white;
            border: none;
            padding: 14px 40px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(99, 102, 241, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background: #475569;
            cursor: not-allowed;
            transform: none;
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            font-size: 0.9rem;
            color: var(--text-dim);
        }

        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        .badge-cache { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        .badge-ai { background: rgba(99, 102, 241, 0.2); color: #818cf8; }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 40px;
            opacity: 0;
            transform: translateY(20px);
        }

        .results-grid.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .result-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .result-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--primary);
        }

        .result-card h3 {
            margin: 0 0 15px 0;
            font-size: 0.8rem;
            color: var(--text-dim);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .result-text {
            font-size: 1.05rem;
            line-height: 1.6;
            color: #e2e8f0;
        }

        /* Loading Animation */
        .loader {
            display: none;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .results-grid { grid-template-columns: 1fr; }
            .container { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Automatic Translator</h1>
            <p class="subtitle">Semantic Caching & RAG Powered AI Engine</p>
        </header>

        <div class="input-section">
            <textarea id="inputText" placeholder="번역할 한국어 문장을 입력해 주세요..."></textarea>
            <div class="controls">
                <button id="translateBtn">
                    <div id="loader" class="loader"></div>
                    <span id="btnText">Translate Now</span>
                </button>
            </div>
            <div class="stats-bar">
                <div id="statusInfo">Ready to translate</div>
                <div id="tokenSaving">Saving: 0%</div>
            </div>
        </div>
        
        <div id="resultsGrid" class="results-grid">
            <div class="result-card">
                <h3>English</h3>
                <div id="enText" class="result-text"></div>
            </div>
            <div class="result-card" style="--primary: #a855f7;">
                <h3>Japanese</h3>
                <div id="jaText" class="result-text"></div>
            </div>
            <div class="result-card" style="--primary: #f43f5e;">
                <h3>Chinese</h3>
                <div id="zhText" class="result-text"></div>
            </div>
        </div>
    </div>

    <script>
        const btn = document.getElementById('translateBtn');
        const btnText = document.getElementById('btnText');
        const loader = document.getElementById('loader');
        const statusInfo = document.getElementById('statusInfo');
        const resultsGrid = document.getElementById('resultsGrid');
        const tokenSaving = document.getElementById('tokenSaving');

        btn.addEventListener('click', async () => {
            const text = document.getElementById('inputText').value.trim();
            if (!text) return;

            // UI State: Loading
            btn.disabled = true;
            loader.style.display = 'block';
            btnText.innerText = 'Translating...';
            resultsGrid.classList.remove('visible');

            try {
                const response = await fetch('/translate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });

                const data = await response.json();
                
                if (response.ok) {
                    // Update Text
                    document.getElementById('enText').innerText = data.translations.en;
                    document.getElementById('jaText').innerText = data.translations.ja;
                    document.getElementById('zhText').innerText = data.translations.zh;
                    
                    // Update Stats
                    const isCache = data.source === 'cache';
                    const badge = isCache ? 
                        '<span class="badge badge-cache">Cache Hit</span>' : 
                        '<span class="badge badge-ai">AI Processed</span>';
                    
                    statusInfo.innerHTML = `${badge} Similarity: ${(data.similarity * 100).toFixed(1)}%`;
                    tokenSaving.innerText = `Saving: ${isCache ? '100%' : '60%'}`;
                    
                    // Show Results with animation
                    setTimeout(() => {
                        resultsGrid.classList.add('visible');
                    }, 100);
                } else {
                    statusInfo.innerHTML = `<span style="color:#f43f5e">Error: ${data.detail}</span>`;
                }
            } catch (err) {
                statusInfo.innerHTML = '<span style="color:#f43f5e">Connection failed. Check server status.</span>';
            } finally {
                btn.disabled = false;
                loader.style.display = 'none';
                btnText.innerText = 'Translate Now';
            }
        });
    </script>
</body>
</html>
